services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: questionnaire-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: questionnaire-backend
    ports:
      - "${BACKEND_PORT:-4100}:4100"
    environment:
      PORT: 4100
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      JWT_SECRET: "${JWT_SECRET:-change-me-use-long-random-value}"
      ADMIN_LOGIN: "${ADMIN_LOGIN:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      SWAGGER_USER: "${SWAGGER_USER:-docs}"
      SWAGGER_PASSWORD: "${SWAGGER_PASSWORD:-docs-password}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-questionnaire}:${POSTGRES_PASSWORD:-questionnaire_password}@db:5432/${POSTGRES_DB:-questionnaire_runner}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4100/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: questionnaire-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-questionnaire_runner}"
      POSTGRES_USER: "${POSTGRES_USER:-questionnaire}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-questionnaire_password}"
    volumes:
      - questionnaire-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questionnaire} -d ${POSTGRES_DB:-questionnaire_runner}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: questionnaire-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@k-service44.ru}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-admin123}"
    volumes:
      - questionnaire-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  questionnaire-db-data:
  questionnaire-pgadmin-data:
